name: Build APK

# This workflow runs automatically every time you upload files to GitHub
on:
  push:
    branches: [ "main" ]
  # Also allows you to manually trigger a build from the GitHub website
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Download your project files from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Java (required to build Android apps)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3 — Download OpenCV AAR automatically (no manual download needed!)
      - name: Download OpenCV AAR
        run: |
          mkdir -p app/libs
          echo "Downloading OpenCV 4.10.0 for Android..."
          wget -q "https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-android-sdk.zip" -O opencv.zip
          echo "Extracting OpenCV..."
          unzip -q opencv.zip
          echo "Copying AAR to app/libs..."
          cp OpenCV-android-sdk/sdk/opencv-release.aar app/libs/
          echo "Copying native libs..."
          mkdir -p app/src/main/jniLibs
          cp -r OpenCV-android-sdk/sdk/native/libs/arm64-v8a app/src/main/jniLibs/
          echo "OpenCV setup complete ✅"

      # Step 4 — Give permission to run Gradle build tool
      - name: Make Gradle executable
        run: chmod +x gradlew

      # Step 5 — Build the APK (this is the actual compilation)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      # Step 6 — Make the APK available for download
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IndustrialVisionCounter-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          # APK will be available for download for 30 days
          retention-days: 30

      # Step 7 — Show build success message
      - name: Build Complete
        run: |
          echo "✅ BUILD SUCCESSFUL!"
          echo "📱 Your APK is ready to download!"
          echo "Go to: Actions tab → Click this workflow run → Download APK at the bottom"
